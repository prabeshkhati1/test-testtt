<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PrabeshGPT — Chat</title>
  <link rel="stylesheet" href="style.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap"
    rel="stylesheet"
  />

  <!--
    marked.js — Markdown renderer library (loaded from CDN).
    This must be loaded BEFORE app.js so that window.marked is
    available when AI messages are rendered. It converts markdown
    like **bold** and ```code``` into real HTML.
  -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="chat-body">

  <!-- Decorative noise texture overlay — purely visual, no interaction -->
  <div class="noise-overlay"></div>

  <!-- ══════════════════════════════════
       SIDEBAR
       Contains: back link, model picker, clear button
  ══════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">

    <!-- Sidebar top: back to home + logo -->
    <div class="sidebar-header">
      <a href="index.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Home
      </a>
      <div class="logo-mark small">PG<span class="logo-dot">•</span></div>
    </div>

    <!-- Model selector section -->
    <div class="sidebar-section">
      <label class="section-label" for="modelSelect">Active Model</label>

      <!-- Dropdown wrapper — the arrow icon is positioned via CSS -->
      <div class="model-selector-wrap">
        <select id="modelSelect" class="model-select">
          <!-- Options are populated dynamically by app.js → initModels() -->
        </select>
        <!-- Decorative dropdown arrow (pointer-events: none in CSS) -->
        <svg class="select-arrow" width="14" height="14" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </div>

      <!-- Model ID and description text — updated by app.js → updateModelMeta() -->
      <div class="model-meta" id="modelMeta">Select a model to see details</div>
    </div>

    <!--
      NOTE: API keys are NOT entered here by users.
      They live in Vercel environment variables on the server side:
        DOUBLEWORD_KEY  — for api.doubleword.ai models (DeepSeek, Gemma, Kimi)
        FREEMODEL_KEY   — for api.freemodel.dev models (GPT-4o Mini)
        CLIENT_SECRET   — a shared secret that protects /api/chat from abuse
      The browser never sees or sends these keys.
    -->

    <!-- Sidebar action buttons -->
    <div class="sidebar-actions">
      <button
        class="action-btn danger"
        id="clearBtn"
        type="button"
        title="Clear all messages"
      >
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"></path>
          <path d="M10 11v6M14 11v6"></path>
        </svg>
        Clear Chat
      </button>
    </div>

  </aside>

  <!--
    Sidebar overlay — a dark semi-transparent backdrop shown on mobile.
    Tapping it closes the sidebar (wired up in the inline script below).
  -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!--
    Hamburger toggle button — only visible on mobile (display:none on desktop).
    Clicking it opens/closes the sidebar via app.js.
  -->
  <button
    class="sidebar-toggle"
    id="sidebarToggle"
    type="button"
    aria-label="Toggle sidebar"
  >
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2">
      <line x1="3"  y1="6"  x2="21" y2="6"></line>
      <line x1="3"  y1="12" x2="21" y2="12"></line>
      <line x1="3"  y1="18" x2="21" y2="18"></line>
    </svg>
  </button>

  <!-- ══════════════════════════════════
       MAIN CHAT AREA
       Contains: top bar, message feed, input bar
  ══════════════════════════════════ -->
  <main class="chat-main">

    <!-- Top bar: shows the active model name + running token count -->
    <div class="chat-topbar">
      <!-- Active model badge — updated by app.js → updateModelMeta() -->
      <div class="active-model-badge" id="activeBadge">No model selected</div>
      <!-- Token counter — updated after each response by app.js -->
      <div class="token-counter" id="tokenCounter">0 tokens used</div>
    </div>

    <!-- ── MESSAGE FEED ──────────────────────────────────────────
         All chat messages are inserted here by app.js.
         aria-live="polite" tells screen readers to announce new messages.
         The #emptyState div is shown when there are no messages yet,
         and hidden as soon as the first message is sent.
    ─────────────────────────────────────────────────────────── -->
    <div
      class="messages-area"
      id="messagesArea"
      role="log"
      aria-live="polite"
      aria-label="Chat messages"
    >
      <!--
        Empty state — shown on first visit (no messages yet).
        ✅ FIXED: Removed the old "add your API key" instruction since
        keys are handled server-side and users don't enter them.
        app.js hides this div when a message is sent,
        and recreates it (with this same id) when chat is cleared.
      -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">⬡</div>
        <div class="empty-title">Ready when you are!</div>
        <div class="empty-sub">
          Pick a model from the sidebar and start chatting.
        </div>
      </div>
    </div>

    <!-- ── INPUT BAR ─────────────────────────────────────────────
         The textarea auto-resizes as the user types (via app.js).
         Send button is disabled until there's text AND no pending response.
         Ctrl+Enter sends the message (Enter alone adds a line break).
    ─────────────────────────────────────────────────────────── -->
    <div class="input-area">
      <div class="input-box-wrap">
        <textarea
          id="messageInput"
          class="message-input"
          placeholder="Send a message…"
          rows="1"
          aria-label="Message input"
          spellcheck="true"
          autocomplete="off"
        ></textarea>
        <!-- Send button — disabled state managed by app.js → syncSendBtn() -->
        <button
          class="send-btn"
          id="sendBtn"
          type="button"
          disabled
          aria-label="Send message"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>

      <!-- Input metadata row: character count + keyboard shortcut hint -->
      <!-- input-meta: char count on left, keyboard hint on right -->
      <!-- kbd-hint is hidden on mobile via CSS (no physical keyboard) -->
      <div class="input-meta">
        <span id="charCount">0 chars</span>
        <span class="kbd-hint">Press <kbd>Ctrl+Enter</kbd> to send</span>
      </div>
    </div>

  </main>

  <!--
    app.js loads here (at the bottom of <body>) so that all the DOM
    elements above are already created when the script runs.
    marked.js was loaded in <head> so it's already available.
  -->
  <script src="app.js"></script>

  <!--
    Inline script for sidebar overlay only.
    The overlay is the dark backdrop on mobile that closes the sidebar
    when you tap outside it. app.js handles the toggle button itself.
  -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("sidebarOverlay");

      // Tapping the dark backdrop on mobile closes the sidebar
      if (overlay && sidebar) {
        overlay.addEventListener("click", () => {
          sidebar.classList.remove("open");
          overlay.classList.remove("active");
        });
      }
    });
  </script>

</body>
</html>
