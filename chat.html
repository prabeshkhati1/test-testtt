<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PrabeshGPT — Chat</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <!-- Markdown renderer -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- XSS sanitiser — must load before app.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
</head>

<body class="chat-body">

  <div class="noise-overlay"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-header">
      <a href="index.html" class="back-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Home
      </a>
      <div class="logo-mark small">PG<span class="logo-dot">.</span></div>
    </div>

    <div class="sidebar-section">
      <label class="section-label" for="modelSelect">Active Model</label>
      <div class="model-selector-wrap">
        <select id="modelSelect" class="model-select">
        </select>
        <svg class="select-arrow" width="13" height="13" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </div>
      <div class="model-meta" id="modelMeta">Select a model to see details</div>
    </div>

    <div class="sidebar-actions">
      <button
        class="action-btn danger"
        id="clearBtn"
        type="button"
        title="Clear all messages"
      >
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"></path>
          <path d="M10 11v6M14 11v6"></path>
        </svg>
        Clear conversation
      </button>
    </div>

  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <button
    class="sidebar-toggle"
    id="sidebarToggle"
    type="button"
    aria-label="Toggle sidebar"
  >
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2">
      <line x1="3"  y1="6"  x2="21" y2="6"></line>
      <line x1="3"  y1="12" x2="21" y2="12"></line>
      <line x1="3"  y1="18" x2="21" y2="18"></line>
    </svg>
  </button>

  <!-- CHAT MAIN -->
  <main class="chat-main">

    <div class="chat-topbar">
      <div class="active-model-badge" id="activeBadge">No model selected</div>
      <div class="token-counter" id="tokenCounter">0 tokens</div>
    </div>

    <div
      class="messages-area"
      id="messagesArea"
      role="log"
      aria-live="polite"
      aria-label="Chat messages"
    >
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">⬡</div>
        <div class="empty-title">Ready when you are</div>
        <div class="empty-sub">
          Pick a model from the sidebar and start your conversation.
        </div>
      </div>
    </div>

    <!-- INPUT -->
    <div class="input-area">
      <div class="input-box-wrap">
        <textarea
          id="messageInput"
          class="message-input"
          placeholder="Message PrabeshGPT…"
          rows="1"
          aria-label="Message input"
          spellcheck="true"
          autocomplete="off"
        ></textarea>

        <!-- VOICE BUTTON — sits between textarea and send button -->
        <button
          class="voice-btn"
          id="voiceBtn"
          type="button"
          aria-label="Start voice input"
          title="Hold to speak"
        >
          <!-- Mic icon (shown when idle) -->
          <svg class="voice-icon-mic" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"></path>
            <path d="M19 10v2a7 7 0 01-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="23"></line>
            <line x1="8"  y1="23" x2="16" y2="23"></line>
          </svg>
          <!-- Stop icon (shown while recording) -->
          <svg class="voice-icon-stop" width="16" height="16" viewBox="0 0 24 24"
               fill="currentColor" stroke="none">
            <rect x="4" y="4" width="16" height="16" rx="2"></rect>
          </svg>
        </button>

        <button
          class="send-btn"
          id="sendBtn"
          type="button"
          disabled
          aria-label="Send message"
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>

      <div class="input-meta">
        <span id="charCount">0 chars</span>
        <!-- Voice status label — shown only while voice mode is active -->
        <span id="voiceStatus" class="voice-status"></span>
        <span class="kbd-hint"><kbd>Ctrl+Enter</kbd> for new line</span>
      </div>
    </div>

  </main>

  <!-- VOICE OVERLAY — full-screen modal shown during active voice conversation -->
  <div class="voice-overlay" id="voiceOverlay" aria-hidden="true">
    <div class="voice-modal">
      <div class="voice-orb-wrap">
        <div class="voice-orb" id="voiceOrb">
          <!-- Mic icon inside orb -->
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5">
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"></path>
            <path d="M19 10v2a7 7 0 01-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="23"></line>
            <line x1="8"  y1="23" x2="16" y2="23"></line>
          </svg>
        </div>
      </div>

      <div class="voice-label" id="voiceLabel">Listening…</div>
      <div class="voice-transcript" id="voiceTranscript"></div>

      <button class="voice-close-btn" id="voiceCloseBtn" type="button" aria-label="Stop voice mode">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6"  y1="6" x2="18" y2="18"></line>
        </svg>
        End voice session
      </button>
    </div>
  </div>

  <script src="app.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("sidebarOverlay");
      if (overlay && sidebar) {
        overlay.addEventListener("click", () => {
          sidebar.classList.remove("open");
          overlay.classList.remove("active");
        });
      }
    });
  </script>

</body>
</html>
